<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quirino High School - Leaderboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #800000 0%, #000000 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s;
        }

        body.dark-mode {
            background: #1a1a1a;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            transition: background 0.3s;
        }

        body.dark-mode .container {
            background: #2a2a2a;
            color: white;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #800000;
            padding-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
        }

        body.dark-mode .header h1 {
            color: white;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background: #800000;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #600000;
            transform: translateY(-2px);
        }

        .btn.secondary {
            background: #999;
        }

        .btn.secondary:hover {
            background: #666;
        }

        .theme-toggle {
            background: transparent;
            border: 2px solid #800000;
            color: #800000;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            transition: all 0.3s;
        }

        body.dark-mode .theme-toggle {
            color: #ffd700;
            border-color: #ffd700;
        }

        .theme-toggle:hover {
            background: #800000;
            color: white;
        }

        .leaderboard {
            margin-top: 30px;
        }

        .leaderboard-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        body.dark-mode .leaderboard-title {
            color: white;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .leaderboard-table thead {
            background: linear-gradient(135deg, #800000 0%, #000000 100%);
            color: white;
        }

        .leaderboard-table th {
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }

        .leaderboard-table td {
            padding: 15px;
            border-bottom: 1px solid #ddd;
            color: #333;
        }

        body.dark-mode .leaderboard-table td {
            border-bottom: 1px solid #444;
            color: white;
        }

        .leaderboard-table tbody tr:hover {
            background: #f5f5f5;
        }

        body.dark-mode .leaderboard-table tbody tr:hover {
            background: #333;
        }

        .rank {
            font-weight: bold;
            font-size: 18px;
        }

        .rank.gold {
            color: #ffd700;
        }

        .rank.silver {
            color: #c0c0c0;
        }

        .rank.bronze {
            color: #cd7f32;
        }

        .medal {
            font-size: 20px;
            margin-right: 5px;
        }

        .score {
            font-weight: bold;
            color: #800000;
        }

        body.dark-mode .score {
            color: #ffd700;
        }

        .statistics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-left: 5px solid #800000;
        }

        body.dark-mode .stat-card {
            background: #333;
            color: white;
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        body.dark-mode .stat-card h3 {
            color: #aaa;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #800000;
        }

        body.dark-mode .stat-card .number {
            color: #ffd700;
        }

        .user-badge {
            display: inline-block;
            background: #ffd700;
            color: #333;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin: 0 5px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .leaderboard-table {
                font-size: 14px;
            }

            .leaderboard-table th,
            .leaderboard-table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Leaderboard</h1>
            <div class="header-buttons">
                <button class="btn secondary" onclick="goBack()">← Back</button>
            </div>
        </div>

        <div class="leaderboard">
            <h2 class="leaderboard-title">Top Achievers</h2>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Student</th>
                        <th>Total Score</th>
                        <th>Quizzes Taken</th>
                        <th>Badges</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <tr>
                        <td><span class="rank gold"><span class="medal">🥇</span>1</span></td>
                        <td>Linnaeus</td>
                        <td class="score">360/400</td>
                        <td>4</td>
                        <td>
                            <span class="user-badge">⭐ Star</span>
                            <span class="user-badge">🚀 Speed</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="statistics">
            <div class="stat-card">
                <h3>Total Students</h3>
                <div class="number">1</div>
            </div>
            <div class="stat-card">
                <h3>Quizzes Completed</h3>
                <div class="number">4</div>
            </div>
            <div class="stat-card">
                <h3>Average Score</h3>
                <div class="number">90%</div>
            </div>
            <div class="stat-card">
                <h3>Perfect Scores</h3>
                <div class="number">1</div>
            </div>
        </div>
    </div>

    <script>
        // Apply saved theme immediately
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        window.addEventListener('load', function() {
            loadLeaderboardData();
        });

        function toggleTheme() {
            const isDark = localStorage.getItem('darkMode') === 'true';
            localStorage.setItem('darkMode', String(!isDark));
            document.body.classList.toggle('dark-mode');
        }

        function goBack() {
            window.location.href = 'quiz.html';
        }

        function loadLeaderboardData() {
            const users = JSON.parse(localStorage.getItem('ictUsers')) || [];
            
            // Calculate user scores
            const scores = users.map(user => {
                const totalScore = (user.quizScores || []).reduce((sum, result) => sum + (result.score * 10), 0);
                return {
                    name: user.name,
                    totalScore: totalScore,
                    quizCount: (user.quizScores || []).length,
                    badges: getBadges(user, totalScore)
                };
            }).sort((a, b) => b.totalScore - a.totalScore);

            // Populate leaderboard
            const tbody = document.getElementById('leaderboardBody');
            tbody.innerHTML = '';

            scores.forEach((score, index) => {
                let medal = '';
                let rankClass = '';
                if (index === 0) {
                    medal = '🥇';
                    rankClass = 'gold';
                } else if (index === 1) {
                    medal = '🥈';
                    rankClass = 'silver';
                } else if (index === 2) {
                    medal = '🥉';
                    rankClass = 'bronze';
                }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><span class="rank ${rankClass}"><span class="medal">${medal}</span>${index + 1}</span></td>
                    <td>${score.name}</td>
                    <td class="score">${score.totalScore}/${scores[0].totalScore > 0 ? Math.max(...scores.map(s => s.totalScore)) : 400}</td>
                    <td>${score.quizCount}</td>
                    <td>${score.badges.map(b => `<span class="user-badge">${b}</span>`).join('')}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function getBadges(user, score) {
            const badges = [];
            if (score >= 300) badges.push('⭐ Star');
            if ((user.quizScores || []).length >= 4) badges.push('🚀 Speed');
            if ((user.quizScores || []).every(q => q.percentage >= 80)) badges.push('🎯 Accuracy');
            if (score >= 360) badges.push('👑 Champion');
            return badges;
        }
    </script>
</body>
</html>
