<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jaime's Education Album • Day & Night Memories</title>
  <style>
    :root {
      --bg-day: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 50%, #ffffff 100%);
      --bg-night: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      --text: #0f172a;
      --text-night: #e0f2fe;
      --card: rgba(255, 255, 255, 0.75);
      --card-night: rgba(30, 41, 59, 0.65);
      --shadow: rgba(0, 0, 0, 0.12);
      --shadow-night: rgba(0, 0, 0, 0.6);
      --accent: #3b82f6;
      --accent-night: #60a5fa;
      --glow: rgba(59, 130, 246, 0.3);
      --glow-night: rgba(96, 165, 250, 0.5);
      --vignette: radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.15) 100%);
    }

    [data-theme="night"] {
      --bg: var(--bg-night);
      --text: var(--text-night);
      --card: var(--card-night);
      --shadow: var(--shadow-night);
      --accent: var(--accent-night);
      --glow: var(--glow-night);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-day);
      color: var(--text);
      min-height: 100vh;
      padding: 3rem 1rem;
      transition: background 0.8s ease, color 0.6s ease;
    }

    [data-theme="night"] body {
      background: var(--bg);
    }

    header {
      text-align: center;
      margin-bottom: 4rem;
      position: relative;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--accent), #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.6rem;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 1.4rem;
      opacity: 0.9;
      font-weight: 500;
    }

    .theme-toggle {
      position: fixed;
      top: 2rem;
      right: 2rem;
      background: var(--card);
      border: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 8px 24px var(--shadow);
      transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .theme-toggle:hover {
      transform: rotate(360deg) scale(1.15);
      box-shadow: 0 12px 40px var(--glow);
    }

    /* ────────────────────────────────────────────────
       NEW: Back Button
    ──────────────────────────────────────────────── */
    .back-btn {
      position: fixed;
      top: 2rem;
      left: 2rem;
      background: var(--card);
      color: var(--accent);
      border: 2px solid var(--accent);
      padding: 0.9rem 1.6rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.05rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      box-shadow: 0 8px 24px var(--shadow);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
    }

    .back-btn:hover {
      background: var(--accent);
      color: white;
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 16px 40px var(--glow);
    }

    .back-btn:active {
      transform: translateY(0);
    }

    .gallery {
      columns: 360px 4;
      column-gap: 1.6rem;
      max-width: 1800px;
      margin: 0 auto;
    }

    .gallery img {
      width: 100%;
      height: auto;
      margin-bottom: 1.6rem;
      border-radius: 20px;
      background: var(--card);
      box-shadow: 0 12px 40px var(--shadow);
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      break-inside: avoid;
      display: block;
      opacity: 0;
      transform: translateY(50px) scale(0.92);
      animation: appear 1s forwards;
      position: relative;
      overflow: hidden;
    }

    .gallery img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--vignette);
      opacity: 0.6;
      border-radius: 20px;
      pointer-events: none;
      transition: opacity 0.6s;
    }

    [data-theme="night"] .gallery img::after {
      opacity: 0.4;
    }

    @keyframes appear {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .gallery img:nth-child(1)  { animation-delay: 0.1s; }
    .gallery img:nth-child(2)  { animation-delay: 0.25s; }
    .gallery img:nth-child(3)  { animation-delay: 0.4s; }
    .gallery img:nth-child(4)  { animation-delay: 0.55s; }
    .gallery img:nth-child(5)  { animation-delay: 0.7s; }
    .gallery img:nth-child(6)  { animation-delay: 0.85s; }
    .gallery img:nth-child(7)  { animation-delay: 1.0s; }
    .gallery img:nth-child(8)  { animation-delay: 1.15s; }
    .gallery img:nth-child(9)  { animation-delay: 1.3s; }
    .gallery img:nth-child(10) { animation-delay: 1.45s; }
    .gallery img:nth-child(11) { animation-delay: 1.6s; }
    .gallery img:nth-child(12) { animation-delay: 1.75s; }
    .gallery img:nth-child(13) { animation-delay: 1.9s; }
    .gallery img:nth-child(14) { animation-delay: 2.05s; }
    .gallery img:nth-child(15) { animation-delay: 2.2s; }

    .gallery img:hover {
      transform: scale(1.08) translateY(-12px);
      box-shadow: 0 30px 70px var(--shadow),
                  0 0 0 6px var(--glow);
      z-index: 2;
    }

    footer {
      text-align: center;
      margin-top: 6rem;
      padding: 2rem;
      color: rgba(var(--text), 0.75);
      font-size: 1rem;
      border-top: 1px solid rgba(148, 163, 184, 0.3);
    }

    @media (max-width: 1100px) { .gallery { columns: 360px 3; } }
    @media (max-width: 768px)  {
      .gallery { columns: 100%; }
      h1 { font-size: 2.8rem; }
      .theme-toggle, .back-btn {
        top: 1.2rem;
        width: auto;
        height: auto;
        padding: 0.7rem 1.3rem;
        font-size: 1rem;
        border-radius: 999px;
      }
      .back-btn { left: 1.2rem; }
      .theme-toggle { right: 1.2rem; }
    }
  </style>
</head>
<body data-theme="day">

  
  <a href="Education.html" class="back-btn">← Back to Education</a>

  <button class="theme-toggle" aria-label="Switch Day/Night">☀️</button>

  <header>
    <h1>Education Album</h1>
    <p class="subtitle">From Sunrise Lessons to Starlit Study Nights</p>
  </header>

  <div class="gallery">
    <img src="img (1).jpg"  alt="Education moment 1"  loading="lazy">
    <img src="img (2).jpg"  alt="Education moment 2"  loading="lazy">
    <img src="img (3).jpg"  alt="Education moment 3"  loading="lazy">
    <img src="img (4).jpg"  alt="Education moment 4"  loading="lazy">
    <img src="img (5).jpg"  alt="Education moment 5"  loading="lazy">
    <img src="img (6).jpg"  alt="Education moment 6"  loading="lazy">
    <img src="img (7).jpg"  alt="Education moment 7"  loading="lazy">
    <img src="img (8).jpg"  alt="Education moment 8"  loading="lazy">
    <img src="img (9).jpg"  alt="Education moment 9"  loading="lazy">
    <img src="img (10).jpg" alt="Education moment 10" loading="lazy">
    <img src="img (11).jpg" alt="Education moment 11" loading="lazy">
    <img src="img (12).jpg" alt="Education moment 12" loading="lazy">
    <img src="img (13).jpg" alt="Education moment 13" loading="lazy">
    <img src="img (14).jpg" alt="Education moment 14" loading="lazy">
    <img src="img (15).jpg" alt="Education moment 15" loading="lazy">
  </div>

  <footer>
    <p>Roar</p>
  </footer>

  <script>
    const toggle = document.querySelector('.theme-toggle');
    const body = document.body;

    const savedTheme = localStorage.getItem('theme') || 'day';
    body.setAttribute('data-theme', savedTheme);
    toggle.textContent = savedTheme === 'night' ? '🌙' : '☀️';

    toggle.addEventListener('click', () => {
      const current = body.getAttribute('data-theme');
      const next = current === 'night' ? 'day' : 'night';
      body.setAttribute('data-theme', next);
      toggle.textContent = next === 'night' ? '🌙' : '☀️';
      localStorage.setItem('theme', next);
    });
  </script>

</body>
</html>
