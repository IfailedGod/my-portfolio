<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jaime's Personal Album • My World in Frames</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text: #c9d1d9;
      --accent: #58a6ff;
      --accent-glow: rgba(88, 166, 255, 0.25);
      --border: #30363d;
      --shadow: rgba(0, 0, 0, 0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem 1rem;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(88,166,255,0.06) 0%, transparent 25%),
        radial-gradient(circle at 90% 80%, rgba(88,166,255,0.04) 0%, transparent 35%);
    }

    header {
      text-align: center;
      margin-bottom: 4.5rem;
      position: relative;
    }

    h1 {
      font-size: 3.6rem;
      font-weight: 800;
      background: linear-gradient(90deg, #58a6ff, #79c0ff, #a5d6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
      margin-bottom: 0.6rem;
    }

    .subtitle {
      font-size: 1.35rem;
      color: #8b949e;
      max-width: 620px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 1.8rem;
      left: 2rem;
      background: var(--surface);
      color: var(--accent);
      border: 2px solid var(--accent);
      padding: 0.8rem 1.6rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1.05rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      box-shadow: 0 6px 20px var(--shadow);
      transition: all 0.4s ease;
      z-index: 999;
    }

    .back-btn:hover {
      background: var(--accent);
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 12px 35px var(--accent-glow);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.8rem;
      max-width: 1800px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px var(--shadow);
      transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
      opacity: 0;
      transform: translateY(40px);
      animation: reveal 1s forwards;
    }

    .card:nth-child(1)  { animation-delay: 0.1s; }
    .card:nth-child(2)  { animation-delay: 0.2s; }
    .card:nth-child(3)  { animation-delay: 0.3s; }
    .card:nth-child(4)  { animation-delay: 0.4s; }
    .card:nth-child(5)  { animation-delay: 0.5s; }
    .card:nth-child(6)  { animation-delay: 0.6s; }
    .card:nth-child(7)  { animation-delay: 0.7s; }
    .card:nth-child(8)  { animation-delay: 0.8s; }
    .card:nth-child(9)  { animation-delay: 0.9s; }
    .card:nth-child(10) { animation-delay: 1.0s; }
    .card:nth-child(11) { animation-delay: 1.1s; }
    .card:nth-child(12) { animation-delay: 1.2s; }
    .card:nth-child(13) { animation-delay: 1.3s; }
    .card:nth-child(14) { animation-delay: 1.4s; }
    .card:nth-child(15) { animation-delay: 1.5s; }
    .card:nth-child(16) { animation-delay: 1.6s; }
    .card:nth-child(17) { animation-delay: 1.7s; }
    .card:nth-child(18) { animation-delay: 1.8s; }
    .card:nth-child(19) { animation-delay: 1.9s; }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:hover {
      transform: translateY(-14px) scale(1.03);
      box-shadow: 0 30px 70px var(--shadow),
                  0 0 0 5px var(--accent-glow);
      border-color: var(--accent);
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 16px 16px 0 0;
      transition: transform 0.55s ease;
    }

    .card:hover img {
      transform: scale(1.08);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(13,17,23,0.75) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      border-radius: 16px;
    }

    .card:hover .overlay {
      opacity: 1;
    }

    footer {
      text-align: center;
      margin-top: 5rem;
      padding: 2.5rem 1rem;
      color: #8b949e;
      font-size: 1rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 900px) {
      .gallery { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.6rem; }
      .back-btn {
        top: 1.2rem;
        left: 1.2rem;
        padding: 0.7rem 1.3rem;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
