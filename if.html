<!DOCTYPE html> 
<html> 
<head> 
<title>Voting Eligibility</title> 
</head> 
<body> 
<h3>Voting Eligibility Checker</h3> 
<form> 
Enter your age: 
<input type="number" id="age"> 
<button type="button" onclick="checkAge()">Check</button> 
</form> 
<p id="result"></p>

<script src="if.js"></script> 

<form> 
    Enter Password: 
    <input type="password" id="password"> 
    <button type="button" onclick="checkPassword()">Login</button> 
</form>

<p id="message"></p>

<form>
	Enter Grade:
	<input type="number" id="grade">
	<button type="button" onclick="evaluateGrade()">Evaluate</button>
</form>
<p id="gradeResult"></p>
</body> 
</html>
